<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
  background:#343541;
  color:white;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#logoAnim{
  width:80px;
  height:80px;
  border-radius:50%;
  overflow:hidden;
  animation:zoomFade 1.5s ease forwards;
}

#logoAnim img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.3);
}

@keyframes zoomFade{
  0%{transform:scale(0.5);opacity:0;}
  100%{transform:scale(1);}
}

/* APP */
#app{
  display:none;
  width:100%;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#202123;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* LOGO */
.logoWrap{
  width:36px;
  height:36px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  box-shadow:0 0 10px cyan;
}
.logoWrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.3);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* CHAT */
.chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* INPUT */
.inputBar{
  padding:12px;
  border-top:1px solid #444;
  position:relative;
}

.inputBox{
  display:flex;
  align-items:center;
  gap:10px;
  max-width:750px;
  margin:auto;
  background:#40414f;
  padding:10px;
  border-radius:12px;
}

input{
  flex:1;
  background:none;
  border:none;
  color:white;
  outline:none;
}

/* ICON */
.icon{
  cursor:pointer;
  padding:6px;
  border-radius:6px;
}
.icon:hover{
  background:#2a2b32;
}

/* 🔥 REAL POPUP MENU */
.menu{
  position:absolute;
  bottom:70px;
  left:calc(50% - 350px);
  background:#2a2b32;
  border-radius:12px;
  padding:10px;
  width:260px;
  display:none;
  flex-direction:column;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  animation:fadeUp 0.2s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.menu button{
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
  border-radius:8px;
  cursor:pointer;
}

.menu button:hover{
  background:#3a3b42;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div id="logoAnim">
    <img src="logo.png">
  </div>
</div>

<div id="app">

<div class="sidebar">
  <div class="logoWrap">
    <img src="logo.png">
  </div>
</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="inputBar">

  <!-- MENU -->
  <div class="menu" id="menu">
    <button>📷 Upload Photo</button>
    <button>📄 Upload File</button>
    <button>📘 Generate Notes (AI Notes Generator)</button>
    <button>📝 Exam Mode (Answer Writing Mode)</button>
    <button>📊 Practice Paper Generator</button>
    <button>📅 Study Planner (Smart Routine Builder)</button>
    <button>🌍 Multi Language Support</button>
    <button>⋯ More Options</button>
  </div>

  <div class="inputBox">

    <span class="icon" onclick="toggleMenu(event)">➕</span>

    <input id="q" placeholder="Message StudyGenius..."
    onkeydown="if(event.key==='Enter') send()">

    <span class="icon">🎤</span>
    <span class="icon" onclick="send()">➤</span>

  </div>
</div>

</div>
</div>

<script>

window.onload=function(){
  setTimeout(()=>{
    splash.style.display="none";
    app.style.display="flex";
  },1200);
};

function toggleMenu(e){
  e.stopPropagation();
  let m=document.getElementById("menu");
  m.style.display = m.style.display==="flex" ? "none" : "flex";
}

/* CLOSE ON OUTSIDE CLICK */
document.addEventListener("click",()=>{
  document.getElementById("menu").style.display="none";
});

function send(){
  let q=document.getElementById("q").value;
  if(!q) return;

  let chat=document.getElementById("chat");

  let div=document.createElement("div");
  div.innerText="You: "+q;
  chat.appendChild(div);

  document.getElementById("q").value="";
}
</script>

</body>
</html>
