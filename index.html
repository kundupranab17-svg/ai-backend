<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
  background:#343541;
  color:white;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#logoAnim{
  width:80px;
  height:80px;
  border-radius:50%;
  overflow:hidden;
  animation:zoomFade 1.5s ease forwards;
}

#logoAnim img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.3);
}

@keyframes zoomFade{
  0%{transform:scale(0.5);opacity:0;}
  100%{transform:scale(1);}
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#202123;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.logoBox{
  display:flex;
  justify-content:center;
  margin-bottom:12px;
}

.logoWrap{
  width:36px;
  height:36px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 0 12px cyan;
}

.logoWrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.3);
}

.btn{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:4px 0;
  background:transparent;
  color:white;
  text-align:left;
  cursor:pointer;
}
.btn:hover{background:#2a2b32;}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOPBAR */
.topbar{
  height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  border-bottom:1px solid #444;
}

/* CHAT */
.chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

/* MESSAGES */
.message{
  max-width:70%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
}

.user{
  align-self:flex-end;
  background:linear-gradient(45deg,#3b82f6,#06b6d4);
}

.bot{
  align-self:flex-start;
  background:#2a2b32;
}

/* INPUT */
.inputBar{
  padding:10px;
  border-top:1px solid #444;
}

.inputBox{
  display:flex;
  align-items:center;
  gap:8px;
  max-width:750px;
  margin:auto;
  background:#40414f;
  padding:8px;
  border-radius:10px;
}

input{
  flex:1;
  background:none;
  border:none;
  color:white;
  outline:none;
}

/* ICON */
.icon{
  cursor:pointer;
  padding:6px;
  border-radius:6px;
}
.icon:hover{
  background:#2a2b32;
}

/* MENU */
.menu{
  position:absolute;
  bottom:60px;
  left:0;
  background:#2a2b32;
  border-radius:10px;
  padding:10px;
  display:none;
  flex-direction:column;
  width:230px;
}

.menu button{
  background:none;
  border:none;
  color:white;
  text-align:left;
  padding:8px;
  cursor:pointer;
}
.menu button:hover{background:#3a3b42;}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div id="logoAnim">
    <img src="logo.png">
  </div>
</div>

<div id="app" style="display:none; width:100%; display:flex;">

<!-- SIDEBAR -->
<div class="sidebar">
  <div>

    <div class="logoBox">
      <div class="logoWrap">
        <img src="logo.png">
      </div>
    </div>

    <button class="btn">💬 Chat</button>
    <button class="btn">📘 Notes</button>
    <button class="btn">📝 Exam</button>
    <button class="btn">📊 Practice</button>
    <button class="btn">📅 Planner</button>

  </div>

  <div>
    Pranab<br>Free Plan
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div>StudyGenius AI ▼</div>
  <div>⚙️</div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBar">

  <div class="inputBox">

    <!-- + BUTTON -->
    <div style="position:relative;">
      <span class="icon" onclick="toggleMenu(event)">➕</span>

      <div class="menu" id="menu">
        <button>📷 Upload Photo</button>
        <button>📄 Upload File</button>
        <button>📘 Generate Notes</button>
        <button>📝 Exam Mode</button>
        <button>📊 Practice Paper</button>
        <button>📅 Study Planner</button>
        <button>🌍 Multi Language</button>
        <button>⋯ More</button>
      </div>
    </div>

    <input id="q" placeholder="Message StudyGenius..."
    onkeydown="if(event.key==='Enter') send()">

    <!-- MIC ICON -->
    <span class="icon">
      <svg width="18" height="18" fill="white" viewBox="0 0 24 24">
        <path d="M12 15a3 3 0 003-3V5a3 3 0 10-6 0v7a3 3 0 003 3z"/>
        <path d="M19 11a7 7 0 01-14 0H3a9 9 0 0018 0h-2z"/>
      </svg>
    </span>

    <span class="icon" onclick="send()">➤</span>

  </div>
</div>

</div>
</div>

<script>

window.onload=function(){
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("app").style.display="flex";
  },1200);
};

function toggleMenu(e){
  e.stopPropagation();
  let m=document.getElementById("menu");
  m.style.display = m.style.display==="flex" ? "none" : "flex";
}

document.addEventListener("click",()=>{
  document.getElementById("menu").style.display="none";
});

function send(){
  let q=document.getElementById("q").value;
  if(!q) return;

  let chat=document.getElementById("chat");

  let user=document.createElement("div");
  user.className="message user";
  user.innerText=q;
  chat.appendChild(user);

  let bot=document.createElement("div");
  bot.className="message bot";
  bot.innerText="Thinking...";
  chat.appendChild(bot);

  setTimeout(()=>{bot.innerText="AI Response";},800);

  document.getElementById("q").value="";
}
</script>

</body>
</html>
