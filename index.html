  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
  transition:0.3s;
}

/* THEMES */
body.dark{background:#343541;color:white;}
body.light{background:#ffffff;color:#111;}

.sidebar{
  width:260px;
  background:#202123;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
body.light .sidebar{background:#f7f7f8;}

.logoBox img{
  width:65px;
  height:65px;
  border-radius:50%;
  object-fit:cover;
  padding:6px;
  background:#0f172a;
  box-shadow:0 0 15px rgba(0, 200, 255, 0.6);
}

/* BUTTON */
.btn{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:4px 0;
  background:transparent;
  color:inherit;
  text-align:left;
  cursor:pointer;
}
.btn:hover{background:#2a2b32;}
body.light .btn:hover{background:#e5e5e5;}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  border-bottom:1px solid #444;
}
body.light .topbar{border-bottom:1px solid #ddd;}

.actions{
  display:flex;
  gap:15px;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* INPUT */
.inputBar{
  padding:15px;
  border-top:1px solid #444;
}
body.light .inputBar{border-top:1px solid #ddd;}

.inputBox{
  display:flex;
  gap:10px;
  max-width:700px;
  margin:auto;
}

input{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body class="dark">

<!-- SIDEBAR -->
<div class="sidebar">
  <div>

    <!-- FINAL LOGO -->
    <div class="logoBox">
      <!-- PUT YOUR IMAGE FILE NAME HERE -->
      <img src="logo.png" alt="logo">
    </div>

    <button class="btn">+ New Chat</button>
    <button class="btn">Search</button>
    <button class="btn">Library</button>

  </div>

  <div>Pranab<br>Free Plan</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <div>StudyGenius AI ▼</div>

    <div class="actions">
      <span onclick="toggleTheme()">🌗</span>
      <span>🔗</span>
      <span>⋮</span>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="inputBar">
    <div class="inputBox">
      <input id="q" placeholder="Message StudyGenius..." onkeydown="if(event.key==='Enter') send()">
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script>

function toggleTheme(){
  let body=document.body;
  if(body.classList.contains("dark")){
    body.classList.remove("dark");
    body.classList.add("light");
  }else{
    body.classList.remove("light");
    body.classList.add("dark");
  }
}

function send(){
  let q=document.getElementById("q").value;
  if(!q)return;

  let chat=document.getElementById("chat");

  let msg=document.createElement("div");
  msg.innerText="You: "+q;
  chat.appendChild(msg);

  let bot=document.createElement("div");
  bot.innerText="AI: Thinking...";
  chat.appendChild(bot);

  setTimeout(()=>{
    bot.innerText="AI: Answer generated.";
  },1000);

  document.getElementById("q").value="";
}
</script>

</body>
</html>
