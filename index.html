<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  height:100vh;
  transition:0.3s;
}

/* DARK MODE */
body.dark{
  background:#0f172a;
  color:white;
}
body.dark .sidebar{background:#020617;}
body.dark .topbar{background:#020617;}
body.dark .inputBar{background:#020617;}
body.dark .inputBar input{background:#1e293b;color:white;}
body.dark .btn{background:#1e293b;color:white;}
body.dark .msg.bot{background:linear-gradient(135deg,#9333ea,#ec4899);}
body.dark .msg.user{background:linear-gradient(135deg,#00c6ff,#0072ff);}

/* LIGHT MODE */
body.light{
  background:#ffffff;
  color:#111;
}
body.light .sidebar{background:#f1f5f9;}
body.light .topbar{background:#ffffff;}
body.light .inputBar{background:#f1f5f9;}
body.light .inputBar input{background:#e2e8f0;color:#111;}
body.light .btn{background:#e2e8f0;color:#111;}
body.light .msg.bot{background:#e0e7ff;}
body.light .msg.user{background:#c7d2fe;}

/* SIDEBAR */
.sidebar{
  width:260px;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* LOGO */
.logo svg{
  width:40px;
  height:40px;
  margin-bottom:20px;
}

/* BUTTONS */
.btn{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  margin:6px 0;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
}

/* CHAT */
.chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.msg{
  max-width:70%;
  padding:14px;
  margin:10px 0;
  border-radius:16px;
}

/* INPUT */
.inputBar{
  display:flex;
  padding:12px;
  gap:8px;
}

.inputBar input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
}

.inputBar button{
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* PANEL */
.panel{
  display:none;
  position:absolute;
  bottom:80px;
  left:300px;
  padding:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div>

    <!-- LOGO -->
    <div class="logo">
      <svg viewBox="0 0 100 100">
        <defs>
          <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00c6ff"/>
            <stop offset="100%" stop-color="#9333ea"/>
          </linearGradient>
        </defs>
        <polygon points="50,10 85,30 85,70 50,90 15,70 15,30"
          fill="none" stroke="url(#g)" stroke-width="6"/>
      </svg>
    </div>

    <button class="btn">New Chat</button>
    <button class="btn">Search</button>
    <button class="btn">Images</button>
    <button class="btn">Deep Search</button>
    <button class="btn">Codex</button>
    <button class="btn">Projects</button>

  </div>

  <div>
    Pranab<br>
    Plan
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <div>StudyGenius AI ▼</div>
    <div>Share ⋮</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="panel" id="panel">
    <button>Notes</button>
    <button>Practice Paper</button>
    <button>Planner</button>
  </div>

  <div class="inputBar">
    <button onclick="togglePanel()">＋</button>
    <input id="q" placeholder="Ask anything..." onkeydown="if(event.key==='Enter') send()">
    <button>🎤</button>
    <button onclick="send()">➤</button>
  </div>

</div>

<script>

/* AUTO DAY/NIGHT */
let hour = new Date().getHours();
if(hour >= 6 && hour < 18){
  document.body.classList.add("light");
}else{
  document.body.classList.add("dark");
}

function togglePanel(){
  let p=document.getElementById("panel");
  p.style.display=p.style.display==="block"?"none":"block";
}

function send(){
  let q=document.getElementById("q").value;
  if(!q)return;

  let chat=document.getElementById("chat");

  let user=document.createElement("div");
  user.className="msg";
  user.innerText=q;
  chat.appendChild(user);

  let bot=document.createElement("div");
  bot.className="msg";
  bot.innerHTML="Thinking...";
  chat.appendChild(bot);

  setTimeout(()=>{
    bot.innerHTML="Answer generated...";
  },1000);

  document.getElementById("q").value="";
  chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
