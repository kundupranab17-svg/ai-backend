<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body.dark{background:#181818;color:white;}
body.light{background:#fff;color:#111;}

body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#logoAnim{
  width:80px;
  height:80px;
  border-radius:50%;
  overflow:hidden;
  animation:zoomFade 1.5s ease forwards;
}

#logoAnim img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.3);
}

@keyframes zoomFade{
  0%{transform:scale(0.6);opacity:0;}
  100%{transform:scale(1);}
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#202123;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
body.light .sidebar{background:#f7f7f8;}

.logoRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.logoWrap{
  width:28px;
  height:28px;
  border-radius:50%;
  overflow:hidden;
}
.logoWrap img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.toggleBtn{
  cursor:pointer;
  padding:6px;
  border-radius:6px;
}
.toggleBtn:hover{background:#2a2b32;}

.btn{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;border:none;border-radius:8px;
  margin:4px 0;background:transparent;
  color:inherit;text-align:left;cursor:pointer;
}
.btn:hover{background:#2a2b32;}

.btn svg{
  width:16px;
  height:16px;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
  height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  border-bottom:1px solid #444;
}
body.light .topbar{border-bottom:#ddd;}

.chat{
  flex:1;
  padding:25px;
  overflow-y:auto;
}
body.dark .chat{background:#181818;}

.message{
  max-width:70%;
  padding:14px;
  margin:10px 0;
  border-radius:14px;
}

.user{
  margin-left:auto;
  background:linear-gradient(45deg,#3b82f6,#06b6d4);
}

.bot{
  background:#242424;
}

/* INPUT */
.inputBar{padding:14px;border-top:1px solid #333;}

.inputBox{
  display:flex;
  align-items:center;
  gap:10px;
  max-width:800px;
  margin:auto;
  background:#2a2a2a;
  border-radius:18px;
  padding:12px 14px;
}

input{
  flex:1;
  background:none;
  border:none;
  color:inherit;
  outline:none;
}

/* ICON */
.icon{
  cursor:pointer;
  padding:6px;
  border-radius:6px;
}
.icon:hover{background:#333;}

/* MENU */
.menu{
  position:absolute;
  bottom:55px;
  left:0;
  background:#2a2a2a;
  border-radius:12px;
  padding:10px;
  display:none;
  flex-direction:column;
  width:230px;
}
.menu button{
  display:flex;
  align-items:center;
  gap:10px;
  background:none;
  border:none;
  color:white;
  padding:10px;
  border-radius:8px;
}
.menu button:hover{background:#3a3a3a;}

.menu svg{
  width:16px;
  height:16px;
}

/* BUTTON */
.actionBtn{
  width:34px;
  height:34px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:#2f2f2f;
}
.sendActive{background:#10a37f;}
</style>
</head>

<body class="dark">

<div id="splash">
  <div id="logoAnim">
    <img src="logo.png">
  </div>
</div>

<div id="app" style="display:none; width:100%; display:flex;">

<div class="sidebar">
  <div>

    <div class="logoRow">
      <div class="logoWrap">
        <img src="logo.png">
      </div>
      <div class="toggleBtn">☰</div>
    </div>

    <!-- SIDEBAR FINAL -->
    <button class="btn">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New chat
    </button>

    <button class="btn">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search chats
    </button>

    <button class="btn">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/></svg>
      Images
    </button>

    <button class="btn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
      Apps
    </button>

    <button class="btn">
      <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/></svg>
      Deep search
    </button>

    <button class="btn">
      <svg viewBox="0 0 24 24"><path d="M8 3h8v18H8z"/></svg>
      Codex
    </button>

    <button class="btn">
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12"/></svg>
      Projects
    </button>

  </div>

  <div>Pranab<br>Free Plan</div>
</div>

<div class="main">

<div class="topbar">
  <div>StudyGenius AI ▼</div>
  <div class="icon" onclick="toggleTheme()">🌗</div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBar">
  <div class="inputBox">

    <div style="position:relative;">
      <span class="icon" onclick="toggleMenu(event)">➕</span>

      <div class="menu" id="menu">
        <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="14"/></svg>Upload Photo</button>
        <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2h9l5 5v15H6z"/></svg>Upload File</button>
        <button>Generate Notes</button>
        <button>Exam Mode</button>
        <button>Practice Paper</button>
        <button>Study Planner</button>
        <button>Multi Language</button>
        <button>More</button>
      </div>

    </div>

    <input id="q" placeholder="Message StudyGenius..."
    oninput="toggleButtons()" onkeydown="if(event.key==='Enter') handleAction()">

    <span class="icon">
      <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z"/>
        <path d="M19 11a7 7 0 01-14 0H3a9 9 0 0018 0h-2z"/>
      </svg>
    </span>

    <div class="actionBtn" id="actionBtn" onclick="handleAction()">
      <svg id="icon" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
        <path d="M4 10h2v4H4zm4-3h2v10H8zm4-4h2v18h-2zm4 3h2v10h-2zm4 4h2v4h-2z"/>
      </svg>
    </div>

  </div>
</div>

</div>
</div>

<script>
window.onload=()=>{
  setTimeout(()=>{
    splash.style.display="none";
    app.style.display="flex";
  },1200);
};

function toggleMenu(e){
  e.stopPropagation();
  menu.style.display = menu.style.display==="flex"?"none":"flex";
}
document.addEventListener("click",()=>menu.style.display="none");

function toggleButtons(){
  let val=q.value.trim();
  let icon=document.getElementById("icon");
  let btn=document.getElementById("actionBtn");

  if(val){
    btn.classList.add("sendActive");
    icon.innerHTML=`<path d="M12 4l-7 7h4v6h6v-6h4z"/>`;
  }else{
    btn.classList.remove("sendActive");
    icon.innerHTML=`<path d="M4 10h2v4H4z"/>`;
  }
}

function handleAction(){
  if(q.value.trim()){
    let chat=document.getElementById("chat");

    let user=document.createElement("div");
    user.className="message user";
    user.innerText=q.value;
    chat.appendChild(user);

    let bot=document.createElement("div");
    bot.className="message bot";
    bot.innerText="Thinking...";
    chat.appendChild(bot);

    q.value="";
    toggleButtons();

    setTimeout(()=>{
      bot.innerText="Response generated.";
    },800);
  }
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
