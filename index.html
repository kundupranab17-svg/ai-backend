<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body.dark{background:#181818;color:white;}
body.light{background:#fff;color:#111;}

body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#202123;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
body.light .sidebar{background:#f7f7f8;}

.logoWrap{
  width:38px;height:38px;border-radius:50%;
  overflow:hidden;margin:auto;
  box-shadow:0 0 12px cyan;
}
.logoWrap img{width:100%;height:100%;object-fit:cover;transform:scale(1.3);}

.btn{
  padding:10px;border:none;border-radius:8px;
  margin:4px 0;background:transparent;
  color:inherit;text-align:left;cursor:pointer;
}
.btn:hover{background:#2a2b32;}
body.light .btn:hover{background:#e5e5e5;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
  height:50px;display:flex;align-items:center;
  justify-content:space-between;padding:0 15px;
  border-bottom:1px solid #444;
}
body.light .topbar{border-bottom:#ddd;}

/* CHAT */
.chat{flex:1;padding:20px;overflow-y:auto;}
body.dark .chat{background:#181818;}

.message{
  max-width:70%;padding:12px;margin:6px 0;
  border-radius:12px;
}
.user{margin-left:auto;background:linear-gradient(45deg,#3b82f6,#06b6d4);}
body.dark .bot{background:#242424;}

/* INPUT */
.inputBar{padding:14px;border-top:1px solid #333;}

.inputBox{
  display:flex;align-items:center;gap:10px;
  max-width:800px;margin:auto;
  background:#2a2a2a;border-radius:18px;
  padding:12px 14px;
}
body.light .inputBox{background:#f7f7f8;}

input{
  flex:1;background:none;border:none;
  color:inherit;outline:none;font-size:15px;
}

/* ICON */
.icon{
  cursor:pointer;padding:6px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
}
.icon:hover{background:#333;}

/* MENU */
.menu{
  position:absolute;bottom:55px;left:0;
  background:#2a2a2a;border-radius:12px;
  padding:10px;display:none;
  flex-direction:column;width:230px;
}
.menu button{
  background:none;border:none;color:white;
  padding:10px;text-align:left;border-radius:8px;
}
.menu button:hover{background:#3a3a3a;}

/* SEND BUTTON */
.sendBtn{
  width:34px;height:34px;border-radius:50%;
  background:#10a37f;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.hidden{display:none;}
</style>
</head>

<body class="dark">

<div id="app" style="width:100%;display:flex;">

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="logoWrap">
      <img src="logo.png">
    </div>

    <button class="btn">💬 Chat</button>
    <button class="btn">📘 Notes</button>
    <button class="btn">📝 Exam</button>
    <button class="btn">📊 Practice</button>
    <button class="btn">📅 Planner</button>
  </div>

  <div>Pranab<br>Free Plan</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div>StudyGenius AI ▼</div>
  <div class="icon" onclick="toggleTheme()">🌗</div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBar">
  <div class="inputBox">

    <!-- + -->
    <div style="position:relative;">
      <span class="icon" onclick="toggleMenu(event)">➕</span>

      <div class="menu" id="menu">
        <button>📷 Upload Photo</button>
        <button>📄 Upload File</button>
        <button>📘 Generate Notes</button>
        <button>📝 Exam Mode</button>
        <button>📊 Practice Paper</button>
        <button>📅 Study Planner</button>
        <button>🌍 Multi Language</button>
        <button>⋯ More</button>
      </div>
    </div>

    <input id="q" placeholder="Message StudyGenius..."
    oninput="toggleButtons()" onkeydown="if(event.key==='Enter') send()">

    <!-- 🎧 LEFT DICTATE ICON -->
    <span class="icon" id="mic">
      <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
        <path d="M4 10h2v4H4zm4-3h2v10H8zm4-4h2v18h-2zm4 3h2v10h-2zm4 4h2v4h-2z"/>
      </svg>
    </span>

    <!-- SEND -->
    <div class="sendBtn hidden" id="sendBtn" onclick="send()">
      <svg width="18" height="18" fill="white" viewBox="0 0 24 24">
        <path d="M12 4l-7 7h4v6h6v-6h4z"/>
      </svg>
    </div>

    <!-- 🔥 NEW RIGHT MIC (VOICE BUTTON LIKE CHATGPT) -->
    <span class="icon">
      <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z"/>
        <path d="M19 11a7 7 0 01-14 0H3a9 9 0 0018 0h-2z"/>
      </svg>
    </span>

  </div>
</div>

</div>
</div>

<script>
function toggleMenu(e){
  e.stopPropagation();
  menu.style.display = menu.style.display==="flex"?"none":"flex";
}

document.addEventListener("click",()=>menu.style.display="none");

function toggleButtons(){
  let val=q.value.trim();
  mic.style.display = val ? "none" : "flex";
  sendBtn.style.display = val ? "flex" : "none";
}

function send(){
  if(!q.value) return;
  let msg=document.createElement("div");
  msg.className="message user";
  msg.innerText=q.value;
  chat.appendChild(msg);
  q.value="";
  toggleButtons();
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
