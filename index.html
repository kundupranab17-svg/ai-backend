<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body.dark{background:#181818;color:white;}
body.light{background:#fff;color:#111;}

body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#logoAnim{
  width:80px;
  height:80px;
  border-radius:50%;
  overflow:hidden;
  animation:zoomFade 1.5s ease forwards;
}

#logoAnim img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.3);
}

@keyframes zoomFade{
  0%{transform:scale(0.6);opacity:0;}
  100%{transform:scale(1);}
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#202123;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
body.light .sidebar{background:#f7f7f8;}

.logoWrap{
  width:38px;height:38px;border-radius:50%;
  overflow:hidden;margin:auto;
  box-shadow:0 0 12px cyan;
}
.logoWrap img{width:100%;height:100%;object-fit:cover;transform:scale(1.3);}

.btn{
  padding:10px;border:none;border-radius:8px;
  margin:4px 0;background:transparent;
  color:inherit;text-align:left;cursor:pointer;
}
.btn:hover{background:#2a2b32;}
body.light .btn:hover{background:#e5e5e5;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
  height:50px;display:flex;align-items:center;
  justify-content:space-between;padding:0 15px;
  border-bottom:1px solid #444;
}
body.light .topbar{border-bottom:#ddd;}

/* CHAT */
.chat{
  flex:1;
  padding:25px;
  overflow-y:auto;
  scroll-behavior:smooth;
}
body.dark .chat{background:#181818;}

.message{
  max-width:70%;
  padding:14px;
  margin:10px 0;
  border-radius:14px;
  line-height:1.5;
}

.user{
  margin-left:auto;
  background:linear-gradient(45deg,#3b82f6,#06b6d4);
}

.bot{
  background:#242424;
}

/* INPUT */
.inputBar{padding:14px;border-top:1px solid #333;}

.inputBox{
  display:flex;align-items:center;gap:10px;
  max-width:800px;margin:auto;
  background:#2a2a2a;border-radius:18px;
  padding:12px 14px;
}
body.light .inputBox{background:#f7f7f8;}

input{
  flex:1;background:none;border:none;
  color:inherit;outline:none;font-size:15px;
}

/* ICON */
.icon{
  cursor:pointer;padding:6px;border-radius:6px;
}
.icon:hover{background:#333;}

/* MENU */
.menu{
  position:absolute;bottom:55px;left:0;
  background:#2a2a2a;
  border-radius:12px;
  padding:8px;
  display:none;
  flex-direction:column;
  width:220px;
}

.menu button{
  background:none;
  border:none;
  color:white;
  padding:10px 12px;
  text-align:left;
  border-radius:8px;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.menu button:hover{
  background:#3a3a3a;
}

/* subtle dot indicator */
.dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:#10a37f;
  opacity:0.7;
}

/* ACTION BUTTON */
.actionBtn{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  background:#2f2f2f;
}
.sendActive{background:#10a37f;}
</style>
</head>

<body class="dark">

<!-- SPLASH -->
<div id="splash">
  <div id="logoAnim">
    <img src="logo.png">
  </div>
</div>

<div id="app" style="display:none; width:100%; display:flex;">

<div class="sidebar">
  <div>
    <div class="logoWrap">
      <img src="logo.png">
    </div>

    <button class="btn">Chat</button>
    <button class="btn">Notes</button>
    <button class="btn">Exam</button>
    <button class="btn">Practice</button>
    <button class="btn">Planner</button>
  </div>

  <div>Pranab<br>Free Plan</div>
</div>

<div class="main">

<div class="topbar">
  <div>StudyGenius AI ▼</div>
  <div class="icon" onclick="toggleTheme()">🌗</div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBar">
  <div class="inputBox">

    <div style="position:relative;">
      <span class="icon" onclick="toggleMenu(event)">＋</span>

      <div class="menu" id="menu">
        <button>Upload Photo <span class="dot"></span></button>
        <button>Upload File <span class="dot"></span></button>
        <button>Generate Notes <span class="dot"></span></button>
        <button>Exam Mode <span class="dot"></span></button>
        <button>Practice Paper <span class="dot"></span></button>
        <button>Study Planner <span class="dot"></span></button>
        <button>Multi Language <span class="dot"></span></button>
        <button>More</button>
      </div>
    </div>

    <input id="q" placeholder="Message StudyGenius..."
    oninput="toggleButtons()" onkeydown="if(event.key==='Enter') handleAction()">

    <span class="icon">🎤</span>

    <div class="actionBtn" id="actionBtn" onclick="handleAction()">
      <span id="icon">≋</span>
    </div>

  </div>
</div>

</div>
</div>

<script>

window.onload=()=>{
  setTimeout(()=>{
    splash.style.display="none";
    app.style.display="flex";
    addBotMessage("Welcome to StudyGenius AI 🚀");
  },1200);
};

function addBotMessage(text){
  let msg=document.createElement("div");
  msg.className="message bot";
  msg.innerText=text;
  chat.appendChild(msg);
}

function toggleMenu(e){
  e.stopPropagation();
  menu.style.display = menu.style.display==="flex"?"none":"flex";
}
document.addEventListener("click",()=>menu.style.display="none");

function toggleButtons(){
  let val=q.value.trim();
  let icon=document.getElementById("icon");
  let btn=document.getElementById("actionBtn");

  if(val){
    btn.classList.add("sendActive");
    icon.innerText="⬆";
  }else{
    btn.classList.remove("sendActive");
    icon.innerText="≋";
  }
}

function handleAction(){
  if(q.value.trim()){
    send();
  }
}

function send(){
  let user=document.createElement("div");
  user.className="message user";
  user.innerText=q.value;
  chat.appendChild(user);

  let bot=document.createElement("div");
  bot.className="message bot";
  bot.innerText="Thinking...";
  chat.appendChild(bot);

  let text=q.value;
  q.value="";
  toggleButtons();

  setTimeout(()=>{
    bot.innerText="This is a smart response to: "+text;
  },800);
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
