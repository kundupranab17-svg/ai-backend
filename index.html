<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body.dark{background:#181818;color:white;}
body.light{background:#fff;color:#111;}
body{margin:0;font-family:system-ui;display:flex;height:100vh;}

/* SPLASH */
#splash{position:fixed;width:100%;height:100%;background:#0f172a;display:flex;justify-content:center;align-items:center;z-index:9999;}
#logoAnim{width:80px;height:80px;border-radius:50%;overflow:hidden;animation:zoomFade 1.5s ease forwards;}
#logoAnim img{width:100%;height:100%;object-fit:cover;transform:scale(1.3);}
@keyframes zoomFade{0%{transform:scale(0.6);opacity:0;}100%{transform:scale(1);}}

/* SIDEBAR */
.sidebar{width:220px;background:#202123;padding:12px;display:flex;flex-direction:column;justify-content:space-between;}
.btn{padding:10px;border:none;background:transparent;color:white;cursor:pointer;}
.btn:hover{background:#2a2b32;}

.main{flex:1;display:flex;flex-direction:column;}
.chat{flex:1;padding:20px;}

.inputBar{padding:10px;border-top:1px solid #333;}
input{width:100%;padding:10px;background:#2a2a2a;border:none;color:white;}
</style>
</head>

<body class="dark">

<div id="splash">
  <div id="logoAnim"><img src="logo.png"></div>
</div>

<div id="app" style="display:none; width:100%; display:flex;">

<div class="sidebar">
  <button class="btn">New Chat</button>
  <button class="btn">Search</button>
</div>

<div class="main">
  <div class="chat" id="chat"></div>

  <div class="inputBar">
    <input id="q" placeholder="Message StudyGenius...">
  </div>
</div>

</div>

<script>
window.onload=()=>{
  const splash = document.getElementById("splash");
  const app = document.getElementById("app");

  setTimeout(()=>{
    splash.style.display="none";
    app.style.display="flex";
  },1200);
};
</script>

</body>
</html>
