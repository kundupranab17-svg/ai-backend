<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:system-ui;
  overflow:hidden;
}

/* 🎬 SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* STEP TEXT */
#sceneText{
  position:absolute;
  top:40%;
  font-size:20px;
  opacity:0;
  animation:fadeText 2s forwards;
}

@keyframes fadeText{
  0%{opacity:0;}
  100%{opacity:1;}
}

/* LOGO */
#logo{
  width:90px;
  height:90px;
  border-radius:50%;
  overflow:hidden;
  transform:scale(0.5);
  opacity:0;
}

/* LOGO IMG */
#logo img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.3);
}

/* STEP 2: ZOOM + TRANSFORM */
.animateLogo{
  animation:brainAnim 2s forwards;
}

@keyframes brainAnim{
  0%{
    transform:scale(0.5);
    opacity:0;
  }
  50%{
    transform:scale(1.4);
    opacity:1;
    box-shadow:0 0 40px cyan;
  }
  100%{
    transform:scale(1);
    box-shadow:0 0 20px cyan;
  }
}

/* STEP 3: MOVE UP */
.moveUp{
  animation:moveUp 1s forwards;
}

@keyframes moveUp{
  to{
    transform:translateY(-60px) scale(0.8);
  }
}

/* APP NAME */
#appName{
  margin-top:20px;
  font-size:26px;
  font-weight:bold;
  opacity:0;
}

.showName{
  animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
  to{opacity:1;}
}
</style>
</head>

<body>

<div id="splash">

  <div id="sceneText">A student solving problems...</div>

  <div id="logo">
    <img src="logo.png">
  </div>

  <div id="appName">StudyGenius AI</div>

</div>

<script>

/* STEP FLOW */

setTimeout(()=>{
  document.getElementById("sceneText").innerText="Zooming into brain...";
},2000);

setTimeout(()=>{
  let logo=document.getElementById("logo");
  logo.classList.add("animateLogo");
},3000);

setTimeout(()=>{
  document.getElementById("sceneText").innerText="Transforming into Genius AI...";
},3500);

setTimeout(()=>{
  let logo=document.getElementById("logo");
  logo.classList.add("moveUp");
  document.getElementById("appName").classList.add("showName");
},5000);

setTimeout(()=>{
  // END SPLASH
  document.body.innerHTML="<h1 style='text-align:center;margin-top:40vh;'>App Starts Here 🚀</h1>";
},7000);

</script>

</body>
</html>
