<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
  background:#343541;
  color:white;
}

/* 🔥 SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#logoAnim{
  width:80px;
  border-radius:50%;
  animation:zoomFade 1.5s ease forwards;
}

@keyframes zoomFade{
  0%{transform:scale(0.5);opacity:0;}
  50%{transform:scale(1.2);opacity:1;}
  100%{transform:scale(1);}
}

/* APP */
#app{
  display:none;
  width:100%;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#202123;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* LOGO */
.logoBox{
  text-align:center;
  margin-bottom:10px;
}
.logoBox img{
  width:60px;
  height:60px;
  border-radius:50%;
  box-shadow:0 0 12px cyan;
}

/* BUTTONS */
.btn{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:4px 0;
  background:transparent;
  color:white;
  text-align:left;
  cursor:pointer;
}
.btn:hover{background:#2a2b32;}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOPBAR */
.topbar{
  height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  border-bottom:1px solid #444;
}

/* CHAT */
.chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

/* MESSAGES */
.message{
  max-width:70%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
}

.user{
  align-self:flex-end;
  background:linear-gradient(45deg,#3b82f6,#06b6d4);
}

.bot{
  align-self:flex-start;
  background:#2a2b32;
}

/* INPUT */
.inputBar{
  padding:10px;
  border-top:1px solid #444;
}

.inputBox{
  display:flex;
  align-items:center;
  gap:8px;
  max-width:750px;
  margin:auto;
  background:#40414f;
  padding:8px;
  border-radius:10px;
}

.inputBox input{
  flex:1;
  background:transparent;
  border:none;
  color:white;
  outline:none;
}

/* ICON BUTTONS */
.iconBtn{
  cursor:pointer;
  padding:6px;
  border-radius:6px;
}
.iconBtn:hover{
  background:#2a2b32;
}
</style>
</head>

<body>

<!-- 🔥 SPLASH -->
<div id="splash">
  <img src="logo.png" id="logoAnim">
</div>

<!-- 🔥 APP -->
<div id="app">

<div class="sidebar">
  <div>

    <div class="logoBox">
      <img src="logo.png">
    </div>

    <button class="btn" onclick="setMode('chat')">💬 Chat</button>
    <button class="btn" onclick="setMode('notes')">📘 Notes</button>
    <button class="btn" onclick="setMode('exam')">📝 Exam</button>
    <button class="btn" onclick="setMode('practice')">📊 Practice</button>
    <button class="btn" onclick="setMode('planner')">📅 Planner</button>

  </div>

  <div>
    Pranab<br>Free Plan
  </div>
</div>

<div class="main">

<div class="topbar">
  <div id="modeTitle">💬 Chat</div>
  <div>⚙️</div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBar">
  <div class="inputBox">

    <span class="iconBtn">➕</span>

    <input id="q" placeholder="Message StudyGenius..."
    onkeydown="if(event.key==='Enter') send()">

    <span class="iconBtn">🎤</span>
    <span class="iconBtn" onclick="send()">➤</span>

  </div>
</div>

</div>
</div>

<script>
/* SPLASH */
window.onload=function(){
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("app").style.display="flex";
  },1500);
};

let currentMode="chat";

function setMode(mode){
  currentMode=mode;

  let title={
    chat:"💬 Chat",
    notes:"📘 Notes Generator",
    exam:"📝 Exam Mode",
    practice:"📊 Practice",
    planner:"📅 Study Planner"
  };

  document.getElementById("modeTitle").innerText=title[mode];
}

function send(){
  let q=document.getElementById("q").value;
  if(!q) return;

  let chat=document.getElementById("chat");

  let user=document.createElement("div");
  user.className="message user";
  user.innerText=q;
  chat.appendChild(user);

  let bot=document.createElement("div");
  bot.className="message bot";
  bot.innerText="Thinking...";
  chat.appendChild(bot);

  let res="";

  if(currentMode==="notes"){
    res="📘 Notes:\n• Key points\n• Explanation\n• Summary";
  }
  else if(currentMode==="exam"){
    res="📝 Q1...\nQ2...\nAnswer...\nImportant Topics...";
  }
  else if(currentMode==="practice"){
    res="📊 MCQ 1...\nMCQ 2...\nAnswers...";
  }
  else if(currentMode==="planner"){
    res="📅 Study Plan:\nMath 2hr\nScience 1hr";
  }
  else{
    res="💬 AI Response for: "+q;
  }

  setTimeout(()=>{bot.innerText=res;},800);

  document.getElementById("q").value="";
  chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
