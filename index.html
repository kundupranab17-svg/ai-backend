<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#020617;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* LOGO */
.logoBox{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
}

.logoSVG{
  width:36px;
  height:36px;
}

/* BUTTONS */
.iconBtn{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  cursor:pointer;
  margin:5px 0;
  transition:0.2s;
}

.iconBtn:hover{
  background:#334155;
}

.icon{
  width:16px;
  height:16px;
  background:white;
  border-radius:4px;
  opacity:0.9;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.topbar{
  padding:10px;
  display:flex;
  justify-content:space-between;
  background:#020617;
}

.chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.msg{
  max-width:70%;
  padding:12px;
  margin:10px 0;
  border-radius:15px;
}

.user{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  margin-left:auto;
}

.bot{
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
}

/* INPUT */
.inputBar{
  display:flex;
  padding:10px;
  background:#020617;
  align-items:center;
}

.inputBar input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
}

.inputBar button{
  margin-left:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.plus{background:#1e293b;color:white;}
.mic{background:#1e293b;color:white;}
.send{background:#00c6ff;color:white;}

/* PANEL */
.panel{
  display:none;
  position:absolute;
  bottom:70px;
  left:300px;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div>

    <div class="logoBox">

      <!-- REAL DYNAMIC SVG LOGO -->
      <svg class="logoSVG" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00c6ff"/>
            <stop offset="100%" stop-color="#ff7eb3"/>
          </linearGradient>
        </defs>

        <polygon points="50,5 90,30 90,70 50,95 10,70 10,30"
          fill="none"
          stroke="url(#grad1)"
          stroke-width="6"/>
      </svg>

      <div>StudyGenius</div>
    </div>

    <button class="iconBtn"><div class="icon"></div> New Chat</button>
    <button class="iconBtn"><div class="icon"></div> Search</button>
    <button class="iconBtn"><div class="icon"></div> Images</button>
    <button class="iconBtn"><div class="icon"></div> Deep Search</button>
    <button class="iconBtn"><div class="icon"></div> Codex</button>
    <button class="iconBtn"><div class="icon"></div> Projects</button>

  </div>

  <div>
    👤 Pranab<br>
    💎 Free Plan
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <div>StudyGenius AI</div>
    <div>⬇ Plans</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="panel" id="panel">
    <button>Notes</button>
    <button>Practice Paper</button>
    <button>Planner</button>
    <button>Upload</button>
  </div>

  <div class="inputBar">
    <button class="plus" onclick="togglePanel()">＋</button>
    <input id="q" placeholder="Ask anything...">
    <button class="mic">🎤</button>
    <button class="send" onclick="send()">➡</button>
  </div>

</div>

<script>
function togglePanel(){
  let p=document.getElementById("panel");
  p.style.display=p.style.display==="block"?"none":"block";
}

function send(){
  let q=document.getElementById("q").value;
  if(!q)return;

  let chat=document.getElementById("chat");

  let user=document.createElement("div");
  user.className="msg user";
  user.innerText=q;
  chat.appendChild(user);

  let bot=document.createElement("div");
  bot.className="msg bot";
  bot.innerHTML="Thinking...";
  chat.appendChild(bot);

  setTimeout(()=>{
    bot.innerHTML=
      "<b>Answer:</b><br><br>"+
      "1. Key concept explained.<br>"+
      "2. Important point.<br>"+
      "3. Example.<br>"+
      "4. Conclusion.<br><br>"+
      "<b>Important Questions:</b><br>"+
      "- Define concept<br>- Explain process";
  },1000);

  document.getElementById("q").value="";
  chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
