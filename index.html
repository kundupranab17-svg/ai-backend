<!DOCTYPE html>
<html>
<head>
  <title>StudyGenius AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #343541;
      color: white;
    }

    #chat {
      height: 85vh;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      max-width: 70%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      line-height: 1.4;
    }

    .user {
      background: #10a37f;
      margin-left: auto;
    }

    .bot {
      background: #444654;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #40414f;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #10a37f;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0e8e6d;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="question" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
</div>

<script>
function send() {
  let q = document.getElementById("question").value;
  if(q === "") return;

  let chat = document.getElementById("chat");

  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = q;
  chat.appendChild(userMsg);

  let botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.innerText = "Thinking...";
  chat.appendChild(botMsg);

  // fake response (for now)
  setTimeout(() => {
    botMsg.innerText = "This is a demo AI response. Real AI coming next step.";
  }, 1000);

  document.getElementById("question").value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
