<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyGenius AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    /* SPLASH */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #logoAnim {
      width: 80px;   /* medium splash logo */
      border-radius: 50%;
      animation: zoomFade 1.5s ease forwards;
    }

    @keyframes zoomFade {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }

    /* APP */
    #app {
      display: none;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* FIXED TOPBAR (IMPORTANT) */
    .topbar {
      height: 50px;                  /* FIXED HEIGHT */
      display: flex;
      align-items: center;
      padding: 0 15px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      font-size: 16px;
      font-weight: 500;
    }

    /* LOGO FIX */
    .nav-logo {
      width: 28px;                  /* PERFECT SIZE */
      height: 28px;
      border-radius: 50%;
      margin-right: 10px;
    }

    /* CHAT */
    .chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin-bottom: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 70%;
      font-size: 14px;
    }

    .user {
      background: #3b82f6;
      align-self: flex-end;
    }

    .bot {
      background: #334155;
      align-self: flex-start;
    }

    /* INPUT */
    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #334155;
      background: #1e293b;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      outline: none;
      font-size: 14px;
    }

    .input-area button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <!-- SPLASH -->
  <div id="splash">
    <img src="logo.png" id="logoAnim">
  </div>

  <!-- APP -->
  <div id="app">

    <!-- FIXED TOPBAR -->
    <div class="topbar">
      <img src="logo.png" class="nav-logo">
      <span>StudyGenius AI</span>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask something...">
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

  <script>
    // SPLASH FIX
    window.onload = function () {
      setTimeout(() => {
        document.getElementById("splash").style.display = "none";
        document.getElementById("app").style.display = "flex";
      }, 1500);
    };

    function sendMessage() {
      const input = document.getElementById("userInput");
      const chat = document.getElementById("chat");

      if (input.value.trim() === "") return;

      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.innerText = input.value;
      chat.appendChild(userMsg);

      const botMsg = document.createElement("div");
      botMsg.className = "message bot";
      botMsg.innerText = "Thinking...";
      chat.appendChild(botMsg);

      setTimeout(() => {
        botMsg.innerText = "Response for: " + input.value;
      }, 1000);

      input.value = "";
      chat.scrollTop = chat.scrollHeight;
    }
  </script>

</body>
</html>
