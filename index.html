<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* THEMES */
body.dark{
  background:#181818;
  color:white;
}
body.light{
  background:#ffffff;
  color:#111;
}

body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#logoAnim{
  width:80px;
  height:80px;
  border-radius:50%;
  overflow:hidden;
  animation:zoomFade 1.5s ease forwards;
}

#logoAnim img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.3);
}

@keyframes zoomFade{
  0%{transform:scale(0.6);opacity:0;}
  100%{transform:scale(1);}
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#202123;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
body.light .sidebar{background:#f7f7f8;}

.logoWrap{
  width:38px;
  height:38px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  box-shadow:0 0 12px cyan;
}

.logoWrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.3);
}

.btn{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:4px 0;
  background:transparent;
  color:inherit;
  text-align:left;
  cursor:pointer;
}
.btn:hover{background:#2a2b32;}
body.light .btn:hover{background:#e5e5e5;}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOPBAR */
.topbar{
  height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  border-bottom:1px solid #444;
}
body.light .topbar{border-bottom:1px solid #ddd;}

/* CHAT */
.chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
}
body.dark .chat{background:#181818;}

/* MESSAGES */
.message{
  max-width:70%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
}
.user{
  margin-left:auto;
  background:linear-gradient(45deg,#3b82f6,#06b6d4);
}
body.dark .bot{
  background:#242424;
}

/* 🔥 CHATGPT STYLE INPUT */
.inputBar{
  padding:14px;
  border-top:1px solid #333;
}

.inputBox{
  display:flex;
  align-items:center;
  gap:10px;
  max-width:800px;
  margin:auto;
  background:#2a2a2a;
  border-radius:18px;
  padding:12px 14px;
}

body.light .inputBox{
  background:#f7f7f8;
}

input{
  flex:1;
  background:none;
  border:none;
  color:inherit;
  outline:none;
  font-size:15px;
}

/* ICON */
.icon{
  cursor:pointer;
  padding:6px;
  border-radius:6px;
}
.icon:hover{
  background:#333;
}

/* MENU */
.menu{
  position:absolute;
  bottom:55px;
  left:0;
  background:#2a2a2a;
  border-radius:12px;
  padding:10px;
  display:none;
  flex-direction:column;
  width:230px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}
.menu button{
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
  border-radius:8px;
  cursor:pointer;
}
.menu button:hover{
  background:#3a3a3a;
}

/* SEND BUTTON */
.sendBtn{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#10a37f;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.hidden{display:none;}

</style>
</head>

<body class="dark">

<div id="splash">
  <div id="logoAnim">
    <img src="logo.png">
  </div>
</div>

<div id="app" style="display:none; width:100%; display:flex;">

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="logoWrap">
      <img src="logo.png">
    </div>

    <button class="btn">💬 Chat</button>
    <button class="btn">📘 Notes</button>
    <button class="btn">📝 Exam</button>
    <button class="btn">📊 Practice</button>
    <button class="btn">📅 Planner</button>
  </div>

  <div>
    Pranab<br>Free Plan
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div>StudyGenius AI ▼</div>
  <div class="icon" onclick="toggleTheme()">🌗</div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBar">
  <div class="inputBox">

    <!-- + -->
    <div style="position:relative;">
      <span class="icon" onclick="toggleMenu(event)">➕</span>

      <div class="menu" id="menu">
        <button>📷 Upload Photo</button>
        <button>📄 Upload File</button>
        <button>📘 Generate Notes</button>
        <button>📝 Exam Mode</button>
        <button>📊 Practice Paper</button>
        <button>📅 Study Planner</button>
        <button>🌍 Multi Language</button>
        <button>⋯ More</button>
      </div>
    </div>

    <input id="q" placeholder="Message StudyGenius..."
    oninput="toggleButtons()" onkeydown="if(event.key==='Enter') send()">

    <!-- MIC -->
    <span class="icon" id="mic">🎤</span>

    <!-- SEND -->
    <div class="sendBtn hidden" id="sendBtn" onclick="send()">➤</div>

  </div>
</div>

</div>
</div>

<script>

window.onload=()=>{
  setTimeout(()=>{
    splash.style.display="none";
    app.style.display="flex";
  },1200);
};

function toggleMenu(e){
  e.stopPropagation();
  let m=document.getElementById("menu");
  m.style.display = m.style.display==="flex" ? "none" : "flex";
}

document.addEventListener("click",()=>{
  document.getElementById("menu").style.display="none";
});

function toggleButtons(){
  let input=q.value.trim();
  mic.style.display = input ? "none" : "block";
  sendBtn.style.display = input ? "flex" : "none";
}

function send(){
  if(!q.value) return;

  let msg=document.createElement("div");
  msg.className="message user";
  msg.innerText=q.value;
  chat.appendChild(msg);

  q.value="";
  toggleButtons();
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
