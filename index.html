<!DOCTYPE html>
<html>
<head>
  <title>StudyGenius AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #343541;
      color: white;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 60%;
    }

    .user {
      background: #10a37f;
      margin-left: auto;
    }

    .bot {
      background: #444654;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #40414f;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="question" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
</div>

<script>
function send() {
  let q = document.getElementById("question").value;
  if(q === "") return;

  let chat = document.getElementById("chat");

  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = q;
  chat.appendChild(userMsg);

  let botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.innerText = "This is demo AI response";
  chat.appendChild(botMsg);

  document.getElementById("question").value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
