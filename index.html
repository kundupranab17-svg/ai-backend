<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
  transition:0.3s;
}

/* THEMES */
body.dark{background:#343541;color:white;}
body.light{background:#ffffff;color:#111;}

/* 🔥 SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#logoAnim{
  width:80px;
  border-radius:50%;
  animation:zoomFade 1.5s ease forwards;
}

@keyframes zoomFade{
  0%{transform:scale(0.5);opacity:0;}
  50%{transform:scale(1.2);opacity:1;}
  100%{transform:scale(1);}
}

/* APP WRAP */
#app{
  display:none;
  width:100%;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#202123;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
body.light .sidebar{background:#f7f7f8;}

/* LOGO PERFECT (NO BIG SPACE NOW) */
.logoBox{
  display:flex;
  justify-content:center;
  margin-bottom:15px;
}

.logoBox img{
  width:60px;   /* reduced */
  height:60px;
  border-radius:50%;
  object-fit:cover;
  padding:6px;
  background:#0f172a;
  box-shadow:0 0 12px rgba(0,200,255,0.5);
}

/* BUTTONS */
.btn{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:4px 0;
  background:transparent;
  color:inherit;
  text-align:left;
  cursor:pointer;
}
.btn:hover{background:#2a2b32;}
body.light .btn:hover{background:#e5e5e5;}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* 🔥 TOPBAR FIXED */
.topbar{
  height:50px;                 /* FIX */
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  border-bottom:1px solid #444;
}
body.light .topbar{border-bottom:1px solid #ddd;}

.actions{
  display:flex;
  gap:15px;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* INPUT */
.inputBar{
  padding:12px;
  border-top:1px solid #444;
}
body.light .inputBar{border-top:1px solid #ddd;}

.inputBox{
  display:flex;
  gap:10px;
  max-width:700px;
  margin:auto;
}

input{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body class="dark">

<!-- 🔥 SPLASH -->
<div id="splash">
  <img src="logo.png" id="logoAnim">
</div>

<!-- 🔥 APP -->
<div id="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div>

    <!-- LOGO -->
    <div class="logoBox">
      <img src="logo.png" alt="logo">
    </div>

    <button class="btn">+ New Chat</button>
    <button class="btn">Search</button>
    <button class="btn">Library</button>

  </div>

  <div>
    Pranab<br>
    Free Plan
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <div>StudyGenius AI ▼</div>

    <div class="actions">
      <span onclick="toggleTheme()">🌗</span>
      <span>🔗</span>
      <span>⋮</span>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="inputBar">
    <div class="inputBox">
      <input id="q" placeholder="Message StudyGenius..." onkeydown="if(event.key==='Enter') send()">
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>
</div>

<script>

/* SPLASH FIX */
window.onload = function(){
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("app").style.display="flex";
  },1500);
};

function toggleTheme(){
  let body=document.body;
  body.classList.toggle("dark");
  body.classList.toggle("light");
}

function send(){
  let q=document.getElementById("q").value;
  if(!q)return;

  let chat=document.getElementById("chat");

  let msg=document.createElement("div");
  msg.innerText="You: "+q;
  chat.appendChild(msg);

  let bot=document.createElement("div");
  bot.innerText="AI: Thinking...";
  chat.appendChild(bot);

  setTimeout(()=>{
    bot.innerText="AI: Answer generated.";
  },1000);

  document.getElementById("q").value="";
}
</script>

</body>
</html>
