<!DOCTYPE html>
<html>
<head>
  <title>StudyGenius AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      text-align: center;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      max-width: 70%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 15px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    .user {
      background: #00c6ff;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      margin-left: auto;
    }

    .bot {
      background: #ff758c;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
    }

    #inputArea {
      display: flex;
      padding: 15px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<header>StudyGenius AI 🤖</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="question" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
</div>

<script>
function send() {
  let q = document.getElementById("question").value;
  if(q === "") return;

  let chat = document.getElementById("chat");

  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = q;
  chat.appendChild(userMsg);

  let botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.innerText = "Thinking...";
  chat.appendChild(botMsg);

  setTimeout(() => {
    botMsg.innerText = "✨ This is your AI response (demo). Real AI coming next step!";
  }, 1000);

  document.getElementById("question").value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
