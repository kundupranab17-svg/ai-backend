<!DOCTYPE html>
<html>
<head>
  <title>StudyHelper AI</title>
  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial;
      text-align: center;
      color: white;
      margin-top: 100px;
    }
    input {
      padding: 12px;
      width: 250px;
      border-radius: 10px;
      border: none;
    }
    button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-left: 10px;
      cursor: pointer;
    }
    #answer {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>StudyHelper AI 🤖</h1>

<input type="text" id="question" placeholder="Ask anything...">
<button onclick="getAnswer()">Ask</button>

<p id="answer"></p>

<script>
async function getAnswer() {
  let q = document.getElementById("question").value;
  if(q === "") {
    document.getElementById("answer").innerText = "Please enter a question!";
    return;
  }

  document.getElementById("answer").innerText = "Thinking...";

  try {
    // Free in-browser AI using Hugging Face Inference API (no key required for some models)
    const response = await fetch("https://api-inference.huggingface.co/models/google/flan-t5-small", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({inputs: q})
    });

    const data = await response.json();
    if(data[0] && data[0].generated_text) {
      document.getElementById("answer").innerText = data[0].generated_text;
    } else {
      document.getElementById("answer").innerText = "Sorry, I couldn't find an answer.";
    }

  } catch (error) {
    document.getElementById("answer").innerText = "Error, try again!";
  }
}
</script>

</body>
</html>
