<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body.dark{background:#181818;color:white;}
body.light{background:#fff;color:#111;}
body{margin:0;font-family:system-ui;display:flex;height:100vh;}

/* SPLASH */
#splash{position:fixed;width:100%;height:100%;background:#0f172a;display:flex;justify-content:center;align-items:center;z-index:9999;}
#logoAnim{width:80px;height:80px;border-radius:50%;overflow:hidden;animation:zoomFade 1.5s ease forwards;}
#logoAnim img{width:100%;height:100%;object-fit:cover;transform:scale(1.3);}
@keyframes zoomFade{0%{transform:scale(0.6);opacity:0;}100%{transform:scale(1);}}

/* SIDEBAR */
.sidebar{width:220px;background:#202123;padding:12px;display:flex;flex-direction:column;justify-content:space-between;transition:width 0.3s;}
body.light .sidebar{background:#f7f7f8;}
.sidebar.collapsed{width:70px;}
.sidebar.collapsed .btn span,
.sidebar.collapsed .chatsTitle,
.sidebar.collapsed .chatName,
.sidebar.collapsed .chatMenuIcon,
.sidebar.collapsed .chatIcon{display:none;}
.sidebar.collapsed .btn{justify-content:center;}
.sidebar.collapsed .chatInfo{justify-content:center;}

.logoRow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logoWrap{width:28px;height:28px;border-radius:50%;overflow:hidden;}
.logoWrap img{width:100%;height:100%;object-fit:cover;}
.toggleBtn{cursor:pointer;padding:6px;border-radius:6px;}
.toggleBtn:hover{background:#2a2b32;}

.btn{display:flex;align-items:center;gap:10px;padding:10px;border:none;border-radius:8px;margin:4px 0;background:transparent;color:inherit;text-align:left;cursor:pointer;}
.btn:hover{background:#2a2b32;}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}

/* CHATS */
.chatsTitle{margin-top:12px;margin-bottom:6px;font-size:12px;color:#888;}
.chatItem{display:flex;align-items:center;justify-content:space-between;padding:8px 6px;border-radius:6px;cursor:pointer;}
.chatItem:hover{background:#2a2b32;}
.chatInfo{display:flex;align-items:center;gap:8px;}
.chatIcon{width:10px;height:10px;border-radius:50%;background:#fff;}
.chatName{font-size:14px;}

/* 3-DOT MENU */
.chatMenuIcon{cursor:pointer;}
.chatMenu{position:absolute;display:none;flex-direction:column;background:#2a2a2a;border-radius:12px;padding:8px;width:180px;z-index:1000;}
.chatMenu button{display:flex;align-items:center;gap:8px;background:none;border:none;color:white;padding:8px;border-radius:6px;cursor:pointer;font-size:14px;}
.chatMenu button:hover{background:#3a3a3a;}
.chatMenu hr{border:none;border-top:1px solid #444;margin:4px 0;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}
.topbar{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 15px;border-bottom:1px solid #444;}
.chat{flex:1;padding:25px;overflow-y:auto;}
.message{max-width:70%;padding:14px;margin:10px 0;border-radius:14px;}
.user{margin-left:auto;background:linear-gradient(45deg,#3b82f6,#06b6d4);}
.bot{background:#242424;}

/* INPUT */
.inputBar{padding:14px;border-top:1px solid #333;}
.inputBox{display:flex;align-items:center;gap:10px;max-width:800px;margin:auto;background:#2a2a2a;border-radius:18px;padding:12px 14px;}
input{flex:1;background:none;border:none;color:inherit;outline:none;}
.icon{cursor:pointer;padding:6px;border-radius:6px;}
.icon:hover{background:#333;}
.actionBtn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#2f2f2f;}
.sendActive{background:#10a37f;}
</style>
</head>
<body class="dark">

<div id="splash">
  <div id="logoAnim"><img src="logo.png"></div>
</div>

<div id="app" style="display:none;width:100%;display:flex;">

<div class="sidebar">
  <div>
    <div class="logoRow">
      <div class="logoWrap"><img src="logo.png"></div>
      <div class="toggleBtn" onclick="toggleSidebar()">☰</div>
    </div>

    <!-- MAIN BUTTONS -->
    <button class="btn"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>New chat</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg><span>Search chats</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/><circle cx="8" cy="8" r="2"/><path d="M21 15l-5-5L5 21"/></svg><span>Images</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Apps</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M11 8v6M8 11h6"/></svg><span>Deep search</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><span>Codex</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><path d="M3 7h5l2 3h11v11H3z"/></svg><span>Projects</span></button>

    <!-- YOUR CHATS -->
    <div class="chatsTitle">Your Chats</div>
    <div class="chatItem">
      <div class="chatInfo"><div class="chatIcon"></div><span class="chatName">Example Chat 1</span></div>
      <div class="chatMenuIcon" onclick="toggleChatMenu(event)">⋮</div>
      <div class="chatMenu">
        <button><svg viewBox="0 0 24 24"><path d="M4 12h16"/></svg>Share</button>
        <button><svg viewBox="0 0 24 24"><path d="M12 2v20"/></svg>Start Group Chat</button>
        <button><svg viewBox="0 0 24 24"><path d="M4 4l16 16"/></svg>Rename</button>
        <hr>
        <button><svg viewBox="0 0 24 24"><path d="M6 3v18"/></svg>Pin Chat</button>
        <button><svg viewBox="0 0 24 24"><path d="M3 6h18v2H3z"/></svg>Archive</button>
        <button><svg viewBox="0 0 24 24"><path d="M3 6h18v2H3z"/></svg style="color:red;">Delete</button>
      </div>
    </div>
  </div>
  <div>Pranab<br>Free Plan</div>
</div>

<div class="main">
<div class="topbar">
  <div>StudyGenius AI ▼</div>
  <div class="icon" onclick="toggleTheme()">🌗</div>
</div>
<div class="chat" id="chat"></div>
<div class="inputBar">
  <div class="inputBox">
    <input id="q" placeholder="Message StudyGenius..." oninput="toggleButtons()" onkeydown="if(event.key==='Enter') handleAction()">
    <div class="actionBtn" id="actionBtn" onclick="handleAction()">➤</div>
  </div>
</div>
</div>
</div>

<script>
window.onload=()=>{
  setTimeout(()=>{
    splash.style.display="none";
    app.style.display="flex";
  },1200);
};

function toggleSidebar(){
  document.querySelector(".sidebar").classList.toggle("collapsed");
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

function toggleChatMenu(e){
  e.stopPropagation();
  let menu=e.target.parentElement.querySelector(".chatMenu");
  menu.style.display=(menu.style.display==="flex")?"none":"flex";
}
document.addEventListener("click",()=>document.querySelectorAll(".chatMenu").forEach(m=>m.style.display="none"));

function toggleButtons(){
  let val=document.getElementById("q").value.trim();
  let btn=document.getElementById("actionBtn");
  if(val) btn.classList.add("sendActive"); else btn.classList.remove("sendActive");
}

function handleAction(){
  let q=document.getElementById("q"); if(!q.value.trim())return;
  let chat=document.getElementById("chat");
  let user=document.createElement("div"); user.className="message user"; user.innerText=q.value; chat.appendChild(user);
  let bot=document.createElement("div"); bot.className="message bot"; bot.innerText="Thinking..."; chat.appendChild(bot);
  q.value=""; toggleButtons();
  setTimeout(()=>{bot.innerText="Response generated."},800);
}
</script>

</body>
</html>
