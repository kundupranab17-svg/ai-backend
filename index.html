<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyHelper AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      color: white;
      font-size: 40px;
    }

    input {
      padding: 12px;
      width: 250px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background-color: #333;
      color: white;
      cursor: pointer;
      margin-left: 10px;
    }

    button:hover {
      background-color: black;
    }

    #answer {
      margin-top: 20px;
      color: white;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>StudyHelper AI</h1>

    <input type="text" id="question" placeholder="Ask your homework question...">
    <button onclick="getAnswer()">Ask</button>

    <p id="answer"></p>
  </div>

  <script>
    function getAnswer() {
      let q = document.getElementById("question").value;

      if(q === "") {
        document.getElementById("answer").innerText = "Please enter a question!";
      } else {
        document.getElementById("answer").innerText = "Answer for: " + q;
      }
    }
  </script>

</body>
</html>
