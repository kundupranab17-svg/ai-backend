<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body.dark{background:#181818;color:white;}
body.light{background:#fff;color:#111;}

body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#logoAnim{
  width:80px;
  height:80px;
  border-radius:50%;
  overflow:hidden;
  animation:zoomFade 1.5s ease forwards;
}

#logoAnim img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.3);
}

@keyframes zoomFade{
  0%{transform:scale(0.6);opacity:0;}
  100%{transform:scale(1);}
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#202123;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
body.light .sidebar{background:#f7f7f8;}

.sidebar.collapsed{width:70px;}
.sidebar.collapsed .btn span{display:none;}
.sidebar.collapsed .btn{justify-content:center;}

.logoRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.logoWrap{
  width:28px;
  height:28px;
  border-radius:50%;
  overflow:hidden;
}
.logoWrap img{width:100%;height:100%;object-fit:cover;}

.toggleBtn{cursor:pointer;padding:6px;border-radius:6px;}
.toggleBtn:hover{background:#2a2b32;}

/* Buttons */
.btn{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;border:none;border-radius:8px;
  margin:4px 0;background:transparent;
  color:inherit;text-align:left;cursor:pointer;
  transition:background 0.15s ease, transform 0.1s ease;
}
.btn:hover{background:#2c2c2c;}
.btn.active{background:#3b82f6;color:white;}

/* SVG icons in buttons */
.btn svg, .menu svg{
  width:18px;
  height:18px;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
  transition:stroke 0.2s, transform 0.1s;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
  height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  border-bottom:1px solid #444;
}

.chat{
  flex:1;
  padding:25px;
  overflow-y:auto;
}

.message{
  max-width:70%;
  padding:14px;
  margin:10px 0;
  border-radius:14px;
}

.user{margin-left:auto;background:linear-gradient(45deg,#3b82f6,#06b6d4);}
.bot{background:#242424;}

/* INPUT */
.inputBar{padding:14px;border-top:1px solid #333;}

.inputBox{
  display:flex;
  align-items:center;
  gap:10px;
  max-width:800px;
  margin:auto;
  background:#2a2a2a;
  border-radius:18px;
  padding:12px 14px;
}

input{
  flex:1;
  background:none;
  border:none;
  color:inherit;
  outline:none;
}

.icon{cursor:pointer;padding:6px;border-radius:6px;transition:background 0.15s;}
.icon:hover{background:#333;}

/* MENU */
.menu{
  position:absolute;
  bottom:55px;
  left:0;
  background:#2a2a2a;
  border-radius:12px;
  padding:10px;
  display:none;
  flex-direction:column;
  width:230px;
}
.menu button{
  display:flex;
  align-items:center;
  gap:10px;
  background:none;
  border:none;
  color:white;
  padding:10px;
  border-radius:8px;
  transition:background 0.15s, transform 0.1s;
}
.menu button:hover{background:#3a3a3a;}
.menu button:active{transform:scale(0.97);}

/* BUTTON */
.actionBtn{
  width:34px;
  height:34px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:#2f2f2f;
  transition:background 0.15s, transform 0.1s;
}
.actionBtn:hover{background:#3a3a3a;}
.actionBtn:active{transform:scale(0.95);}
.sendActive{background:#10a37f;}
</style>
</head>

<body class="dark">

<div id="splash">
  <div id="logoAnim"><img src="logo.png"></div>
</div>

<div id="app" style="display:none; width:100%; display:flex;">

<div class="sidebar">
  <div>
    <div class="logoRow">
      <div class="logoWrap"><img src="logo.png"></div>
      <div class="toggleBtn" onclick="toggleSidebar()">☰</div>
    </div>

    <!-- SIDEBAR SAME -->
    <button class="btn active"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>New chat</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg><span>Search chats</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/><circle cx="8" cy="8" r="2"/><path d="M21 15l-5-5L5 21"/></svg><span>Images</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Apps</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M11 8v6M8 11h6"/></svg><span>Deep search</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><span>Codex</span></button>
    <button class="btn"><svg viewBox="0 0 24 24"><path d="M3 7h5l2 3h11v11H3z"/></svg><span>Projects</span></button>
  </div>

  <div>Pranab<br>Free Plan</div>
</div>

<div class="main">

<div class="topbar">
  <div>StudyGenius AI ▼</div>
  <div class="icon" onclick="toggleTheme()">🌗</div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBar">
  <div class="inputBox">

    <div style="position:relative;">
      <span class="icon" onclick="toggleMenu(event)">➕</span>

      <!-- MENU -->
      <div class="menu" id="menu">
        <button><svg viewBox="0 0 24 24"><path d="M4 7h4l2-3h4l2 3h4v13H4z"/><circle cx="12" cy="13" r="4"/></svg>Upload Photo</button>
        <button><svg viewBox="0 0 24 24"><path d="M6 2h9l5 5v15H6z"/><polyline points="14 2 14 8 20 8"/></svg>Upload File</button>
        <button><svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 00-4 13v3h8v-3a7 7 0 00-4-13z"/></svg>Generate Notes</button>
        <button><svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="16" y2="11"/></svg>Exam Mode</button>
        <button><svg viewBox="0 0 24 24"><line x1="6" y1="20" x2="6" y2="10"/><line x1="12" y1="20" x2="12" y2="6"/><line x1="18" y1="20" x2="18" y2="14"/></svg>Practice Paper</button>
        <button><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Study Planner</button>
        <button><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/></svg>Multi Language</button>
        <button><svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>More</button>
      </div>

    </div>

    <input id="q" placeholder="Message StudyGenius..."
    oninput="toggleButtons()" onkeydown="if(event.key==='Enter') handleAction()">

    <span class="icon">
      <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z"/>
        <path d="M19 11a7 7 0 01-14 0H3a9 9 0 0018 0h-2z"/>
      </svg>
    </span>

    <div class="actionBtn" id="actionBtn" onclick="handleAction()">
      <svg id="icon" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
        <path d="M4 10h2v4H4zm4-3h2v10H8zm4-4h2v18h-2zm4 3h2v10h-2zm4 4h2v4h-2z"/>
      </svg>
    </div>

  </div>
</div>

</div>
</div>

<script>
window.onload=()=>{
  setTimeout(()=>{
    splash.style.display="none";
    app.style.display="flex";
  },1200);
};

function toggleSidebar(){
  document.querySelector(".sidebar").classList.toggle("collapsed");
}

function toggleMenu(e){
  e.stopPropagation();
  menu.style.display = menu.style.display==="flex"?"none":"flex";
}
document.addEventListener("click",()=>menu.style.display="none");

function toggleButtons(){
  let val=q.value.trim();
  let icon=document.getElementById("icon");
  let btn=document.getElementById("actionBtn");

  if(val){
    btn.classList.add("sendActive");
    icon.innerHTML=`<path d="M12 4l-7 7h4v6h6v-6h4z"/>`;
  }else{
    btn.classList.remove("sendActive");
    icon.innerHTML=`<path d="M4 10h2v4H4zm4-3h2v10H8zm4-4h2v18h-2zm4 3h2v10h-2zm4 4h2v4h-2z"/>`;
  }
}

function handleAction(){
  if(q.value.trim()){
    let chat=document.getElementById("chat");

    let user=document.createElement("div");
    user.className="message user";
    user.innerText=q.value;
    chat.appendChild(user);

    let bot=document.createElement("div");
    bot.className="message bot";
    bot.innerText="Thinking...";
    chat.appendChild(bot);

    q.value="";
    toggleButtons();

    setTimeout(()=>{
      bot.innerText="Response generated.";
    },800);
  }
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
