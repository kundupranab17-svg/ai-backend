<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyGenius AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    /* SPLASH SCREEN */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #logoAnim {
      width: 120px;
      border-radius: 50%;
      animation: zoomFade 1.5s ease forwards;
    }

    @keyframes zoomFade {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      50% {
        transform: scale(1.2);
        opacity: 1;
      }
      100% {
        transform: scale(1);
      }
    }

    /* MAIN APP */
    #app {
      display: none;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
      background: #1e293b;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    /* CHAT AREA */
    .chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 10px;
      padding: 10px 15px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #3b82f6;
      align-self: flex-end;
    }

    .bot {
      background: #334155;
      align-self: flex-start;
    }

    /* INPUT AREA */
    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #334155;
      background: #1e293b;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    .input-area button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <img src="logo.png" id="logoAnim" alt="logo">
  </div>

  <!-- MAIN APP -->
  <div id="app">
    
    <div class="topbar">StudyGenius AI</div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask something...">
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

  <script>
    // SPLASH LOGIC
    window.onload = function () {
      setTimeout(() => {
        document.getElementById("splash").style.display = "none";
        document.getElementById("app").style.display = "flex";
      }, 1800);
    };

    // CHAT FUNCTION
    function sendMessage() {
      const input = document.getElementById("userInput");
      const chat = document.getElementById("chat");

      if (input.value.trim() === "") return;

      // User message
      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.innerText = input.value;
      chat.appendChild(userMsg);

      // Bot message
      const botMsg = document.createElement("div");
      botMsg.className = "message bot";
      botMsg.innerText = "Thinking...";
      chat.appendChild(botMsg);

      // Fake response
      setTimeout(() => {
        botMsg.innerText = "This is a demo response for: " + input.value;
      }, 1000);

      input.value = "";
      chat.scrollTop = chat.scrollHeight;
    }
  </script>

</body>
</html>
